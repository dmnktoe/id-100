{{ define "layout" }}
  <!doctype html>
  <html lang="de">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>{{ .Title }}</title>

      <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
      <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/favicon/favicon-32x32.png" />
      <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/favicon/favicon-16x16.png" />
      <link rel="shortcut icon" href="/static/assets/favicon/favicon.ico" />
      <link rel="apple-touch-icon" sizes="180x180" href="/static/assets/favicon/apple-touch-icon.png" />
      <link rel="manifest" href="/static/site.webmanifest" />
      <meta name="theme-color" content="#ffffff" />

      <!-- SEO Meta Tags -->
      {{ if .SEO }}
        <meta name="description" content="{{ .SEO.Description }}" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="{{ .SEO.Type }}" />
        <meta property="og:url" content="{{ .SEO.URL }}" />
        <meta property="og:title" content="{{ .SEO.Title }}" />
        <meta property="og:description" content="{{ .SEO.Description }}" />
        {{ if .SEO.ImageURL }}
          <meta property="og:image" content="{{ .SEO.ImageURL }}" />
        {{ end }}


        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:url" content="{{ .SEO.URL }}" />
        <meta name="twitter:title" content="{{ .SEO.Title }}" />
        <meta name="twitter:description" content="{{ .SEO.Description }}" />
        {{ if .SEO.ImageURL }}
          <meta name="twitter:image" content="{{ .SEO.ImageURL }}" />
        {{ end }}
      {{ end }}


      {{ if .PreloadFrame }}
        <!-- Preload the card frame so it is always ready before the inner photos load -->
        <link rel="preload" as="image" href="/static/assets/images/ui/card_frame-holder.png" fetchpriority="high" />
      {{ end }}

      <link rel="stylesheet" href="{{ .AssetMainCSS }}" />
      {{ if .AdditionalCSS }}
        <link rel="stylesheet" href="/static/{{ .AdditionalCSS }}" />
      {{ end }}
    </head>
    <body>
      <div class="page-wrapper">
        {{ template "header" . }}


        <main class="site-content">
          {{ .ContentHTML }}
        </main>

        {{ template "footer" . }}


        <!-- Drawer elements (global) -->
        <div class="drawer-backdrop" id="drawer-backdrop" aria-hidden="true"></div>
        <aside class="drawer-panel" id="drawer-panel" role="dialog" aria-modal="true" aria-hidden="true" tabindex="-1"></aside>
      </div>

<script>
  // Global configuration
  window.GEOCODING_API_URL = '{{.GeocodingURL}}';
  window.MEILI_SEARCH_KEY = '{{.MeiliKey}}';
  window.SENTRY_DSN = '{{.SentryDSN}}';
  window.ENVIRONMENT = '{{.Environment}}';
  window.APP_VERSION = '{{.AppVersion}}';
  window.UMAMI_SCRIPT_URL = '{{.UmamiScriptURL}}';
  window.UMAMI_WEBSITE_ID = '{{.UmamiWebsiteID}}';
</script>
      <script src="{{ .AssetMainJS }}"></script>
    </body>
  </html>
{{ end }}
