<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <!-- Invert alpha of the PNG: opaque border -> transparent mask area, transparent center -> visible mask area -->
    <filter id="invertAlpha">
      <feComponentTransfer>
        <feFuncA type="table" tableValues="1 0" />
      </feComponentTransfer>
    </filter>
    <mask id="invMask" maskUnits="objectBoundingBox">
      <image x="0" y="0" width="1" height="1" href="card_frame.png" preserveAspectRatio="none" filter="url(#invertAlpha)" />
    </mask>
  </defs>
  <!-- a white rect masked by the inverted frame; white areas are visible in the mask -->
  <rect width="100%" height="100%" fill="white" mask="url(#invMask)" />
</svg>