name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      # chai2010/webp compiles bundled C sources, so cgo must stay enabled.
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so `git describe --tags` resolves the version

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebp-dev

      - name: Verify formatting (gofmt)
        run: |
          go version
          diff=$(gofmt -d .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found formatting differences"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "Building backend (version=$VERSION)"
          go build -ldflags "-X 'id-100/internal/version.Version=${VERSION}'" -o bin/id-100 ./cmd/id-100

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebp-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Pin for reproducible runs; bump deliberately (renovate manages it).
          version: v2.12.2
